# iQSM+ – Conda environment
# Create:   conda env create -f environment.yml
# Activate: conda activate iqsm-plus
# Launch:   python app.py

name: iqsm-plus
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch>=2.0
  - pytorch-cuda=12.1          # remove this line for CPU-only install
  - numpy>=1.23
  - scipy>=1.10
  - matplotlib>=3.7
  - pip
  - pip:
      - nibabel>=5.0
      - gradio>=4.0
      - pydicom>=2.3
