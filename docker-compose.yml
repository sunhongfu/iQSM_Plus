# ============================================================
# iQSM+ – Docker Compose
# ============================================================
# Works out-of-the-box on:
#   - Apple Silicon Mac (M1/M2/M3/M4)
#   - Intel/AMD Mac
#   - Windows (Docker Desktop with WSL2)
#   - Linux (AMD64 or ARM64)
#
# First-time setup (run once on the host — NOT inside the container):
#
#   python run.py --download-checkpoints  ← downloads model weights into checkpoints/
#   python run.py --download-demo         ← (optional) downloads demo NIfTIs into demo/
#
# Start the app:
#   docker compose build               ← first time only
#   docker compose up                  ← web app at http://localhost:7860
#
# demo/ and checkpoints/ are bind-mounted — files downloaded on the host are
# visible inside the container immediately, no restart needed.
#
# NVIDIA GPU (Linux only):
#   1. Install NVIDIA Container Toolkit
#      https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#   2. Set TORCH_VARIANT=cu121 in build.args below
#   3. Uncomment the GPU block at the bottom of this file
#   4. docker compose build && docker compose up
# ============================================================

services:
  iqsm-plus:
    build:
      context: .
      args:
        # cpu   → works on Apple Silicon, Intel Mac, Windows, Linux (no GPU needed)
        # cu121 → NVIDIA GPU on Linux (also requires uncommenting GPU block below)
        # cu118 → older NVIDIA GPU on Linux
        TORCH_VARIANT: cpu
    image: iqsm-plus:latest
    ports:
      - "7860:7860"
    volumes:
      - ./demo:/iQSM_Plus/demo
      - ./checkpoints:/iQSM_Plus/checkpoints

    # ── NVIDIA GPU – uncomment the block below for Linux + NVIDIA GPU ─────────
    # Also change TORCH_VARIANT above to cu121 and rebuild.
    #
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
