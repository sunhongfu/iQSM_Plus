# iQSM+ configuration
# Run: python run.py --config config.yaml
# Paths can be relative (resolved against `data_dir`) or absolute.
# `data_dir` itself is resolved against the directory holding this YAML.

# --- Required (pick one input style) ---
data_dir: demo

# Style A — DICOM folder (recommended, all metadata auto-detected):
# dicom_dir: dicoms

# Style B — pre-converted NIfTI / MAT files
# B1. Multiple 3D phase echoes:
# echo_files:
#   - phase_e1.nii
#   - phase_e2.nii
#   - phase_e3.nii
# te_ms: [3.2, 6.5, 9.8]

# B2. Single 4D phase NIfTI (default for the bundled demo):
echo_4d: ph_multi_echo.nii.gz
te_ms: [3.2, 6.5, 9.8, 13.1, 16.4, 19.7, 23.1, 26.4]

# B3. Legacy single-echo (3D phase):
# phase: ph_single_echo.nii.gz
# te_ms: [20]

# --- Optional inputs ---
mag: mag_multi_echo.nii.gz   # magnitude NIfTI / MAT — improves multi-echo fitting
mask: mask_multi_echo.nii.gz # brain mask NIfTI / MAT — null for all-voxels

# --- Acquisition / hyper-parameters ---
b0: 3.0                      # field strength (Tesla)
b0_dir: null                 # B0 direction unit vector — null = [0,0,1] / from DICOM
voxel_size: null             # [x, y, z] mm; null reads from NIfTI header
eroded_rad: 3                # mask erosion radius (voxels)
reverse_phase_sign: 0        # 0 = no, 1 = yes (flip if iron-rich GM appears dark)

# --- Output ---
output: ./iqsm_plus_output

# Notes:
#   * Checkpoints are loaded from ./checkpoints/ (download with --download-checkpoints).
#   * Saved output:
#       <output>/iQSM_plus.nii.gz   — susceptibility (chi)
