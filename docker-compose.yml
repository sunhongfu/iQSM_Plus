# ============================================================
# iQSM+ – Docker Compose
# ============================================================
# Works out-of-the-box on:
#   - Apple Silicon Mac (M1/M2/M3/M4)
#   - Intel/AMD Mac
#   - Windows (Docker Desktop with WSL2)
#   - Linux (AMD64 or ARM64)
#
# Usage:
#   docker compose build              ← first time only
#   docker compose up                 ← start web app at http://localhost:7860
#
# Demo data and checkpoints are NOT bundled in the image.
# Download them into the local folders before or after starting:
#
#   # On the host (if Python env is available):
#   python run.py --download-demo
#   python run.py --download-checkpoints
#
#   # Or while the container is running (no restart needed):
#   docker compose exec iqsm-plus python run.py --download-demo
#   docker compose exec iqsm-plus python run.py --download-checkpoints
#
# demo/ and checkpoints/ are bind-mounted so the container and host
# always share the same files. Downloads are visible immediately.
#
# NVIDIA GPU (Linux only):
#   1. Install NVIDIA Container Toolkit
#      https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#   2. Set TORCH_VARIANT=cu121 in build.args below
#   3. Uncomment the GPU block at the bottom of this file
#   4. docker compose build && docker compose up
# ============================================================

services:
  iqsm-plus:
    build:
      context: .
      args:
        # cpu   → works on Apple Silicon, Intel Mac, Windows, Linux (no GPU needed)
        # cu121 → NVIDIA GPU on Linux (also requires uncommenting GPU block below)
        # cu118 → older NVIDIA GPU on Linux
        TORCH_VARIANT: cpu
    image: iqsm-plus:latest
    ports:
      - "7860:7860"
    volumes:
      - ./outputs:/tmp/iqsm_outputs
      - ./demo:/iQSM_Plus/demo
      - ./checkpoints:/iQSM_Plus/checkpoints

    # ── NVIDIA GPU – uncomment the block below for Linux + NVIDIA GPU ─────────
    # Also change TORCH_VARIANT above to cu121 and rebuild.
    #
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
